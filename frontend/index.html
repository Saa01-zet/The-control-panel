<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление пользователями</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">
    <div class="container">
        <div class="header">
            <h1>👥 Управление пользователями</h1>
            <div class="header-buttons">
                <button id="themeBtn" class="theme-btn">🌙 Темная тема</button>
                <button id="sortAscBtn" class="sort-btn">Сортировать А-Я</button>
                <button id="sortDescBtn" class="sort-btn">Сортировать Я-А</button>
            </div>
        </div>

        <!-- Блок сообщений -->
        <div id="messageBox" class="message-box"></div>

        <!-- Форма создания -->
        <div class="form-card">
            <h2>➕ Создать пользователя</h2>
            <div class="form-group">
                <input type="text" id="createName" placeholder="Логин">
                <input type="password" id="createPass" placeholder="Пароль (мин 6)">
                <select id="createRole">
                    <option value="user">Пользователь</option>
                    <option value="admin">Администратор</option>
                </select>
                <button id="createBtn">Создать</button>
            </div>
        </div>

        <!-- Поиск -->
        <div class="search-card">
            <h2>🔍 Поиск пользователя</h2>
            <input type="text" id="searchInput" placeholder="Введите логин...">
        </div>

        <!-- Список пользователей карточками -->
        <div class="users-section">
            <h2>📋 Пользователи</h2>
            <div id="usersContainer" class="users-cards"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
